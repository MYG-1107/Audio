<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="robots" content="noindex, nofollow" />
  <title>VoxRoom – Audio Room</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="room-page" data-theme="dark">

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner container">
      <a href="index.html" class="logo" aria-label="VoxRoom home">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <circle cx="20" cy="20" r="20" fill="var(--accent)"/>
          <path d="M20 10 C15 10 11 14 11 19 L11 21 C11 26 15 30 20 30 C25 30 29 26 29 21 L29 19 C29 14 25 10 20 10Z" fill="white"/>
          <rect x="17" y="28" width="6" height="5" rx="1" fill="white"/>
          <rect x="14" y="32" width="12" height="2" rx="1" fill="white"/>
        </svg>
        <span class="logo-text">VoxRoom</span>
      </a>

      <div class="room-header-actions">
        <!-- Room ID + copy -->
        <div class="room-id-badge" id="roomIdBadge" title="Click to copy invite link" role="button" tabindex="0" aria-label="Copy room invite link">
          <span id="roomIdDisplay">Connecting…</span>
          <svg class="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="room-main container">

    <!-- Connection status banner -->
    <div class="status-banner" id="statusBanner" role="status" aria-live="polite">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Connecting…</span>
    </div>

    <!-- Audio room content -->
    <div class="room-layout">

      <!-- Participants panel -->
      <section class="participants-panel card" aria-labelledby="participantHeading">
        <h2 class="panel-title" id="participantHeading">
          Participants
          <span class="participant-count badge" id="participantCount">0</span>
        </h2>
        <ul class="participant-list" id="participantList" aria-label="Participants in this room">
          <!-- populated by room.js -->
        </ul>
      </section>

      <!-- Controls panel -->
      <section class="controls-panel" aria-label="Room controls">
        <!-- Mic visualiser (animated when speaking) -->
        <div class="mic-visualiser" id="micVisualiser" aria-hidden="true">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div>
        </div>

        <div class="control-buttons">
          <!-- Mute / Unmute -->
          <button class="control-btn btn-mic active" id="micBtn" aria-label="Mute microphone" title="Mute / Unmute">
            <!-- Mic on -->
            <svg class="icon-mic-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            <!-- Mic off -->
            <svg class="icon-mic-off hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <line x1="1" y1="1" x2="23" y2="23"/>
              <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
              <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>

          <!-- Raise hand -->
          <button class="control-btn btn-hand" id="raiseHandBtn" aria-label="Raise hand" title="Raise / Lower hand">
            ✋
          </button>

          <!-- Leave room -->
          <button class="control-btn btn-leave" id="leaveBtn" aria-label="Leave room" title="Leave room">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>

        <!-- Share row -->
        <div class="share-row">
          <button class="btn btn-outline btn-small" id="copyLinkBtn">
            📋 Copy invite link
          </button>
          <button class="btn btn-outline btn-small" id="shareWhatsAppBtn">
            💬 Share on WhatsApp
          </button>
        </div>
      </section>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast" role="alert" aria-live="assertive" aria-atomic="true"></div>
  </main>

  <!-- Socket.io client (served by backend or CDN fallback) -->
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="room.js"></script>
</body>
</html>
